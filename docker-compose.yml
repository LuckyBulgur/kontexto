services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - kontexto
    restart: unless-stopped

  kontexto:
    build: .
    expose:
      - "8080"
    volumes:
      - kontexto-data:/app/data
    environment:
      - KONTEXTO_DATA_DIR=/app/data
      - TZ=Europe/Berlin
    restart: unless-stopped

volumes:
  kontexto-data:
  caddy-data:
  caddy-config:
